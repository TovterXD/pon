<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

    
        body{
            background: #F0FFFF;
        }

        .tab {
            display: none;
        }

        .tab.active {
            display: block;
        }
        
    </style>
</head>
<body>
    <header>
        <nav>
            <button data-target="tab1">Обо мне</button>
            <button data-target="tab2">Еще не придумал</button>
            <button data-target="tab3">Потом придумаю</button>
        </nav>
    </header>

    <div class="tabs-container">

       <div id="tab1" class="tab active">
            <h1>Пенисы</h1>
       </div>


       <div id="tab2" class="tab">
            <h2>Хуй</h2>
       </div> 

    </div>

        <div id="tab3" class="tab">
            <h2>аморальные пенисы</h2>
       </div>



    <script>
        document.querySelectorAll('button[data-target]').forEach(button => {
            button.addEventListener('click', event => {
                document.querySelectorAll('.tab').forEach(tab => {
                    console.log([tab.id, button])
                    tab.classList.toggle('active', tab.id == button.dataset.target)
                })
            })
        })
    </script>
</body>
</html>
